# Sweep recipe: the CONTACT-RICH headline task — PegInsertionSide-v1 (state obs).
# This is where world models actually separate from model-free RL + (later) classical planning,
# unlike PickCube (trivial, everything ceilings at 1.0). See literature-positioning.md.
task: peginsertion_floor
env_id: PegInsertionSide-v1
obs: state
description: >
  Contact-rich floor: model-free PPO vs world-model TD-MPC2 on PegInsertionSide-v1.
  SAC omitted — ManiSkill ships no tuned PegInsertionSide SAC config, and an untuned SAC would be
  an unfair floor. PPO's *tuned* budget is 250M steps (~12h/seed); reduced to 50M here for
  feasibility — the sample-efficiency story IS "TD-MPC2 solves in 2M env steps while PPO needs ~250M",
  so PPO-not-solved-at-50M vs TD-MPC2-solved-at-2M is a fair, honest headline (caption the 50M cap).
  3 seeds to start (extend to 5 for the final rliable result). The world-model-vs-CLASSICAL crossover
  (OMPL/cuRobo) is the real contribution and runs as a separate later piece.

configs:
  ppo:                          # model-free floor (BASELINE) — budget reduced from tuned 250M
    launcher: benchmarks/ManiSkill/examples/baselines/ppo/ppo.py
    overrides: { num_envs: 1024, update_epochs: 8, num_minibatches: 32, total_timesteps: 50_000_000, num_steps: 100, num_eval_steps: 100 }
    timeout_min: 360
    seeds: [1, 2, 3]
  tdmpc2:                       # world model under test — ManiSkill-tuned PegInsertionSide config
    launcher: benchmarks/ManiSkill/examples/baselines/tdmpc2/train.py
    overrides: { model_size: 5, steps: 2_000_000, num_envs: 32, control_mode: pd_joint_delta_pos, buffer_size: 1_000_000 }
    timeout_min: 720
    seeds: [1, 2, 3]
